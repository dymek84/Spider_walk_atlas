<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider Walk Atlas Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
    #app { display: flex; width: 100vw; height: 100vh; }
    #phaser-container { flex: 1; display: flex; align-items: center; justify-content: center; }
    #controls-panel {
      width: 340px;
      min-width: 340px;
      background: #16213e;
      border-left: 1px solid #0f3460;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #controls-panel h2 { color: #e94560; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .section { background: #0f3460; border-radius: 6px; padding: 10px; }
    .section-title { font-size: 11px; font-weight: bold; color: #a8b2d8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .control-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .control-row label { font-size: 11px; color: #8892b0; min-width: 80px; flex-shrink: 0; }
    .control-row input[type="range"] { flex: 1; accent-color: #e94560; height: 4px; cursor: pointer; }
    .control-row .val { font-size: 11px; color: #ccd6f6; min-width: 38px; text-align: right; font-family: monospace; }
    .leg-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .leg-tab { padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; background: #1a1a4e; border: 1px solid #0f3460; color: #8892b0; transition: all 0.15s; }
    .leg-tab.active { background: #e94560; border-color: #e94560; color: #fff; }
    button.btn {
      padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 12px; font-weight: bold; transition: background 0.2s;
    }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-primary:hover { background: #c73652; }
    .btn-secondary { background: #0f3460; color: #ccd6f6; border: 1px solid #e94560; }
    .btn-secondary:hover { background: #1a4a8a; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    #export-output {
      display: none;
      background: #0a0a1a;
      border: 1px solid #e94560;
      border-radius: 6px;
      padding: 10px;
      font-size: 10px;
      font-family: monospace;
      color: #a8e6cf;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre;
      word-break: break-all;
    }
    .speed-row { display: flex; align-items: center; gap: 8px; }
    .checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .checkbox-row label { font-size: 11px; color: #8892b0; cursor: pointer; }
    .checkbox-row input[type="checkbox"] { accent-color: #e94560; cursor: pointer; }
    #phaser-container canvas { border-radius: 4px; box-shadow: 0 0 30px rgba(233,69,96,0.2); }
  </style>
</head>
<body>
  <div id="app">
    <div id="phaser-container"></div>
    <div id="controls-panel">
      <h2>🕷 Spider Walk Atlas</h2>

      <div class="section">
        <div class="section-title">Animation</div>
        <div class="control-row">
          <label>Speed</label>
          <input type="range" id="anim-speed" min="1" max="24" value="8" step="1">
          <span class="val" id="anim-speed-val">8</span>
        </div>
        <div class="control-row">
          <label>Body Sway</label>
          <input type="range" id="body-sway" min="0" max="20" value="4" step="0.5">
          <span class="val" id="body-sway-val">4</span>
        </div>
        <div class="control-row">
          <label>Leg Lift</label>
          <input type="range" id="leg-lift" min="0" max="30" value="10" step="1">
          <span class="val" id="leg-lift-val">10</span>
        </div>
        <div class="control-row">
          <label>Swing</label>
          <input type="range" id="leg-swing" min="0" max="45" value="20" step="1">
          <span class="val" id="leg-swing-val">20</span>
        </div>
        <div class="control-row">
          <label>Lower Bend</label>
          <input type="range" id="lower-bend" min="-30" max="30" value="10" step="1">
          <span class="val" id="lower-bend-val">10</span>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="show-debug" />
          <label for="show-debug">Show Debug Bounds</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="show-skeleton" />
          <label for="show-skeleton">Show Skeleton</label>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Leg Positions (Per Leg)</div>
        <div class="leg-tabs" id="leg-tabs">
          <div class="leg-tab active" data-leg="0">L1</div>
          <div class="leg-tab" data-leg="1">L2</div>
          <div class="leg-tab" data-leg="2">L3</div>
          <div class="leg-tab" data-leg="3">L4</div>
          <div class="leg-tab" data-leg="4">R1</div>
          <div class="leg-tab" data-leg="5">R2</div>
          <div class="leg-tab" data-leg="6">R3</div>
          <div class="leg-tab" data-leg="7">R4</div>
        </div>
        <div class="control-row">
          <label>Attach X</label>
          <input type="range" id="leg-attach-x" min="-60" max="60" value="0" step="1">
          <span class="val" id="leg-attach-x-val">0</span>
        </div>
        <div class="control-row">
          <label>Attach Y</label>
          <input type="range" id="leg-attach-y" min="-60" max="60" value="0" step="1">
          <span class="val" id="leg-attach-y-val">0</span>
        </div>
        <div class="control-row">
          <label>Base Angle</label>
          <input type="range" id="leg-base-angle" min="-180" max="180" value="0" step="1">
          <span class="val" id="leg-base-angle-val">0</span>
        </div>
        <div class="control-row">
          <label>Upper Size</label>
          <input type="range" id="upper-size" min="0.1" max="2.0" value="1.0" step="0.05">
          <span class="val" id="upper-size-val">1.00</span>
        </div>
        <div class="control-row">
          <label>Utiiiii Size</label>
          <input type="range" id="lower-size" min="0.1" max="2.0" value="1.0" step="0.05">
          <span class="val" id="lower-size-val">1.00</span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Body & Head</div>
        <div class="control-row">
          <label>Body Size</label>
          <input type="range" id="body-size" min="0.2" max="3.0" value="1.0" step="0.05">
          <span class="val" id="body-size-val">1.00</span>
        </div>
        <div class="control-row">
          <label>Head Size</label>
          <input type="range" id="head-size" min="0.2" max="3.0" value="1.0" step="0.05">
          <span class="val" id="head-size-val">1.00</span>
        </div>
        <div class="control-row">
          <label>Head Offset X</label>
          <input type="range" id="head-offset-x" min="-50" max="50" value="0" step="1">
          <span class="val" id="head-offset-x-val">0</span>
        </div>
        <div class="control-row">
          <label>Head Offset Y</label>
          <input type="range" id="head-offset-y" min="-50" max="50" value="0" step="1">
          <span class="val" id="head-offset-y-val">0</span>
        </div>
        <div class="control-row">
          <label>Scale</label>
          <input type="range" id="global-scale" min="0.3" max="3.0" value="1.5" step="0.05">
          <span class="val" id="global-scale-val">1.50</span>
        </div>
      </div>

      <div class="section btn-row">
        <button class="btn btn-secondary" id="reset-btn">⌺ Reset</button>
        <button class="btn btn-primary" id="export-btn">⬇ Export JSON</button>
      </div>

      <div id="export-output"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
